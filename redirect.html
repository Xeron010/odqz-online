<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=https://odqz.com">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }
        
        p {
            font-size: 16px;
            opacity: 0.95;
            margin-bottom: 24px;
        }
        
        a {
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: inline-block;
            transition: all 0.3s;
            border: 2px solid white;
        }
        
        a:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Redirecting...</h1>
        <p>You're being redirected to our main site. If not, click below.</p>
        <a href="https://odqz.com">Go to ODQZ →</a>
    </div>
</body>
</html>
